; JuicedNowPlaying.ini
;
; Runtime config for the "Now Playing" ASI overlay.
;
; The track id lives on the heap, so we reach it via a pointer chain
; anchored in Juiced.exe's static data section. If a future Juiced
; patch shifts these addresses, re-find them with Cheat Engine and
; edit here — no rebuild needed.
;
; Walk:
;   p  = *(Juiced.exe + TrackIdBase)
;   for each offset in TrackIdOffsets (outermost to innermost):
;       p = *(p + offset)     -- EXCEPT the very last offset
;   id = *(p + lastOffset)
;
; Equivalently: N offsets = (N-1) dereferences + final add + one read.

[Memory]
; Base offset into Juiced.exe's module (image base + this value is
; the address of a pointer).
TrackIdBase    = 0x0035DC74

; Pointer-walk offsets, outermost first. Verified 2026-04-10 across
; 3 game restarts via CE pointer scanner.
TrackIdOffsets = 0x48, 0x20

; Static flag: 1 while in-race, 0 otherwise. Direct read from
; Juiced.exe image base + this offset (no pointer chain).
; Verified 2026-04-10.
InRaceFlag     = 0x0032024C

[Display]
; LED color, R,G,B (0..255). Default cyan matches the stock HUD.
LedColor = 0, 255, 255
